<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I8 · RTT Homepage (US-3) — 10 Sections</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --green:#01B756; --green-600:#019648; --green-700:#017A3A;
    --green-100:#D6F5E2; --green-050:#E4FFF4;
    --ink:#030A16; --ink-800:#0D1626; --ink-700:#151D2A;
    --text2:#5A6373; --text3:#8A93A3; --text4:#B0BAC8;
    --border:#E6E9EE; --border-d:#D2D7E0;
    --lavender:#EFF2F9; --lav-fg:#4753C6;
    --cream:#F9EDBF; --mint:#E4FFF4;
    --white:#FFFFFF; --bg:#F4F6FA;
    --amber-bg:#FFFBEB; --amber-fg:#B45309;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: #E8ECF4; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Outer layout */
  .outer {
    max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px;
  }
  .page-header { text-align: center; margin-bottom: 36px; }
  .page-header .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .page-header h1 { font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -.02em; margin-bottom: 6px; }
  .page-header p { font-size: 13px; color: var(--text2); }

  /* Phone */
  .phone-wrap { display: flex; justify-content: center; }
  .phone {
    width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    background: var(--bg); position: relative;
    box-shadow: 0 40px 80px rgba(3,10,22,.2), 0 0 0 1px rgba(3,10,22,.08);
  }
  .phone-inner { height: 100%; display: flex; flex-direction: column; }

  /* Dynamic island */
  .di { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 32px; background: #000; border-radius: 20px; z-index: 30; }

  /* Home indicator */
  .hi { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 3px; background: rgba(3,10,22,.2); z-index: 30; }

  /* Scroll */
  .scroll { flex: 1; overflow-y: auto; }
  .scroll::-webkit-scrollbar { display: none; }

  /* ── Header (dark ink) */
  .app-header {
    background: var(--ink-800); padding: 0 16px 16px; position: relative;
    overflow: hidden;
  }
  .app-header::before {
    content: ''; position: absolute; top: -40px; right: -30px;
    width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle, rgba(1,183,86,.18) 0%, transparent 70%);
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 64px 0 14px;
  }
  .header-logo { display: flex; align-items: center; gap: 8px; }
  .header-logo span { font-size: 18px; font-weight: 800; color: var(--white); letter-spacing: -.02em; }
  .header-icons { display: flex; gap: 8px; }
  .header-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center;
  }
  .search-bar {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.1);
    border-radius: 12px; padding: 9px 12px; display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,.4); font-family: inherit;
  }

  /* Section wrappers */
  .section { padding: 20px 0 4px; }
  .section-white { background: var(--white); }
  .section-bg { background: var(--bg); }
  .section-mint { background: var(--green-050); }
  .section-dark { background: var(--ink-800); }

  .section-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 12px;
  }
  .section-title { font-size: 16px; font-weight: 800; color: var(--ink); letter-spacing: -.01em; }
  .section-link {
    font-size: 12px; font-weight: 600; color: var(--green); background: none; border: none; cursor: pointer; font-family: inherit;
  }
  .section-sub { font-size: 12px; color: var(--text3); padding: 0 16px 10px; margin-top: -8px; }

  /* ── §1 Nudge Card */
  .nudge-card {
    margin: 0 16px 4px; background: var(--white);
    border: 1.5px solid var(--green-100); border-radius: 18px; overflow: hidden;
    box-shadow: 0 2px 16px rgba(1,183,86,.1), 0 1px 3px rgba(3,10,22,.06);
  }
  .nudge-header {
    background: linear-gradient(135deg, var(--ink-800) 0%, #0d2235 100%);
    padding: 14px 14px 10px; position: relative; overflow: hidden;
  }
  .nudge-header::after {
    content: ''; position: absolute; right: -10px; bottom: -10px;
    width: 80px; height: 80px; border-radius: 50%;
    background: radial-gradient(circle, rgba(1,183,86,.25) 0%, transparent 70%);
  }
  .nudge-eyebrow { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .nudge-issuer { font-size: 15px; font-weight: 800; color: var(--white); }
  .nudge-meta { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
  .nudge-income {
    padding: 12px 14px; background: var(--white);
    display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border);
  }
  .nudge-income-big { font-size: 26px; font-weight: 800; color: var(--ink); letter-spacing: -.03em; line-height: 1; }
  .nudge-income-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .nudge-amount-row {
    padding: 10px 14px; background: var(--bg);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .nudge-amount-left { font-size: 12px; color: var(--text2); }
  .nudge-amount-val { font-size: 14px; font-weight: 800; color: var(--ink); }
  .nudge-change-btn {
    font-size: 12px; font-weight: 700; color: var(--green); background: none; border: none; cursor: pointer; font-family: inherit;
  }
  .nudge-actions { padding: 12px 14px; display: flex; gap: 8px; align-items: center; }
  .btn-invest {
    flex: 1; padding: 12px; border-radius: 12px; border: 0;
    background: var(--green); color: var(--white); font-family: inherit;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-remind {
    padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--white); color: var(--ink); font-family: inherit;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .nudge-dismiss {
    padding: 8px 14px; text-align: right;
  }
  .nudge-dismiss button { background: none; border: none; font-family: inherit; font-size: 11px; color: var(--text4); cursor: pointer; }

  /* Amount editor inline */
  .inline-editor {
    padding: 12px 14px; background: var(--white); border-top: 1px solid var(--border);
  }
  .inline-editor-label { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
  .chips-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .amount-chip {
    padding: 7px 11px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--white); font-family: inherit; font-size: 12px; font-weight: 600;
    color: var(--ink); cursor: pointer; transition: all 140ms;
  }
  .amount-chip.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .inline-cancel { background: none; border: none; font-family: inherit; font-size: 12px; color: var(--text3); cursor: pointer; }

  /* ── §2 About this investment */
  .infographic-grid { display: flex; gap: 10px; padding: 0 16px 4px; overflow-x: auto; }
  .infographic-grid::-webkit-scrollbar { display: none; }
  .info-card {
    min-width: 220px; background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; flex-shrink: 0;
    box-shadow: 0 1px 6px rgba(3,10,22,.05);
  }
  .info-card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 10px; }
  .info-stat-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .info-stat {
    flex: 1; background: var(--bg); border-radius: 8px; padding: 8px 10px;
  }
  .info-stat-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .info-stat-value { font-size: 16px; font-weight: 800; color: var(--ink); margin-top: 1px; }
  .info-stat-value.green { color: var(--green); }
  .info-use-funds {
    background: var(--mint); border-radius: 8px; padding: 8px 10px;
    font-size: 11px; color: var(--green-700); line-height: 1.5; font-weight: 500;
  }
  .repayment-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 8px 0; }
  .repayment-fill { height: 100%; background: var(--green); border-radius: 3px; }
  .issuer-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); background: var(--bg); padding: 3px 8px; border-radius: 6px; margin-right: 5px; margin-bottom: 5px; }

  /* ── §3 & §4 Bond rows */
  .bond-row {
    margin: 0 16px 10px; background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px 13px; display: flex; align-items: center; gap: 12px;
    position: relative; overflow: hidden;
  }
  .bond-row::after { content: ''; position: absolute; right: -8px; bottom: -8px; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, rgba(1,183,86,.1) 0%, transparent 70%); }
  .bond-row-logo {
    width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--white); display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: var(--green-600); flex-shrink: 0;
  }
  .bond-row-main { flex: 1; }
  .bond-row-issuer { font-size: 13px; font-weight: 700; color: var(--ink); }
  .bond-row-chips { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
  .chip-small {
    display: inline-flex; align-items: center; padding: 2px 7px;
    border-radius: 5px; font-weight: 600; font-size: 10px; white-space: nowrap;
  }
  .chip-aaa { background: var(--white); color: var(--ink); border: 1px solid var(--border-d); }
  .chip-secured { background: var(--lavender); color: var(--lav-fg); }
  .chip-rating { background: var(--green-100); color: var(--green-600); }
  .bond-row-right { text-align: right; }
  .bond-row-ytm { font-size: 17px; font-weight: 800; color: var(--green); letter-spacing: -.02em; }
  .bond-row-tenure { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .social-proof { display: flex; align-items: center; gap: 5px; padding: 5px 13px 10px; margin: -6px 16px 6px; font-size: 11px; color: var(--text3); }

  /* ── §5 Category tabs */
  .tab-bar {
    display: flex; gap: 0; margin: 0 16px 12px;
    background: var(--bg); border-radius: 10px; padding: 4px; overflow: hidden;
  }
  .tab-btn {
    flex: 1; padding: 8px 6px; border-radius: 7px; border: 0; font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 140ms;
    background: transparent; color: var(--text3);
  }
  .tab-btn.active { background: var(--white); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

  /* ── §6 How bonds work */
  .steps-row { display: flex; gap: 0; padding: 0 16px 4px; }
  .step { flex: 1; text-align: center; position: relative; }
  .step:not(:last-child)::after {
    content: '→'; position: absolute; right: -6px; top: 20px;
    font-size: 14px; color: var(--text4);
  }
  .step-num {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--green-050); border: 1.5px solid var(--green-100);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: var(--green);
    margin: 0 auto 7px;
  }
  .step-title { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
  .step-desc { font-size: 10px; color: var(--text3); line-height: 1.5; }

  /* ── §7 New on Aspero */
  .new-grid { display: flex; gap: 10px; padding: 0 16px 4px; }
  .new-card {
    flex: 1; background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px; overflow: hidden; position: relative;
  }
  .new-badge {
    display: inline-flex; background: var(--green-100); color: var(--green-600);
    padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 700;
    margin-bottom: 6px;
  }
  .new-timestamp { font-size: 10px; color: var(--text4); margin-bottom: 8px; }
  .new-issuer { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 5px; }
  .new-ytm { font-size: 22px; font-weight: 800; color: var(--green); letter-spacing: -.03em; line-height: 1; }
  .new-ytm-label { font-size: 10px; color: var(--text3); }

  /* ── §8 Testimonials */
  .testimonial-scroll { display: flex; gap: 10px; padding: 0 16px 4px; overflow-x: auto; }
  .testimonial-scroll::-webkit-scrollbar { display: none; }
  .tcard {
    min-width: 220px; background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; flex-shrink: 0;
  }
  .tcard-stars { color: #F59E0B; font-size: 12px; margin-bottom: 8px; letter-spacing: 1px; }
  .tcard-text { font-size: 12px; color: var(--ink); line-height: 1.7; margin-bottom: 10px; font-style: italic; }
  .tcard-meta { display: flex; align-items: center; gap: 8px; }
  .tcard-avatar { width: 28px; height: 28px; border-radius: 999px; background: var(--green-100); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--green-600); }
  .tcard-name { font-size: 12px; font-weight: 700; color: var(--ink); }
  .tcard-city { font-size: 11px; color: var(--text3); }

  /* ── §9 Trust markers */
  .trust-rows { margin: 0 16px; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--white); }
  .trust-row { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px; border-bottom: 1px solid var(--border); }
  .trust-row:last-child { border-bottom: 0; }
  .trust-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--green-050); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .trust-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
  .trust-desc { font-size: 11px; color: var(--text3); line-height: 1.6; }

  /* ── Bottom nav */
  .bottom-nav {
    display: flex; background: var(--white); border-top: 1px solid var(--border);
    padding: 8px 0 20px; flex-shrink: 0; position: relative; z-index: 10;
  }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; }
  .nav-item-label { font-size: 10px; font-weight: 600; }
  .nav-item.active .nav-item-label { color: var(--green); }
  .nav-item:not(.active) .nav-item-label { color: var(--text4); }

  /* Annotations */
  .two-col { display: flex; gap: 32px; align-items: flex-start; max-width: 1100px; margin: 0 auto; }
  .ann-sidebar { flex: 1; min-width: 180px; }
  .ann-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .ann-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 6px; }
  .ann-body { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .ann-body strong { color: var(--ink); }
  .ann-num { display: flex; align-items: baseline; gap: 4px; }
  .ann-big { font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -.02em; }
  .ann-small { font-size: 11px; color: var(--text3); }
  .ann-trend { font-size: 11px; color: var(--green); font-weight: 700; }
  .spec-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .spec-row:last-child { border-bottom: 0; }
  .spec-key { color: var(--text3); }
  .spec-val { color: var(--ink); font-weight: 700; }
  .section-index { display: flex; flex-direction: column; gap: 6px; }
  .section-index-item { display: flex; align-items: baseline; gap: 8px; font-size: 12px; color: var(--text2); }
  .section-index-item .num { width: 16px; font-weight: 800; color: var(--green); flex-shrink: 0; }
  .section-index-item .name { font-weight: 600; color: var(--ink); }
  .section-index-item .trigger { font-size: 11px; color: var(--text4); margin-left: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const T = {
  green:'#01B756', green600:'#019648', green700:'#017A3A',
  green100:'#D6F5E2', green050:'#E4FFF4',
  ink:'#030A16', ink800:'#0D1626', ink700:'#151D2A',
  text2:'#5A6373', text3:'#8A93A3', text4:'#B0BAC8',
  border:'#E6E9EE', borderD:'#D2D7E0',
  lavender:'#EFF2F9', lavFg:'#4753C6',
  white:'#FFFFFF', bg:'#F4F6FA',
  mint:'#E4FFF4',
};

/* ── Icons */
const Chev = ({ dir = 'down', size = 14, color = T.text3 }) => {
  const r = { down:0, up:180, left:90, right:-90 }[dir];
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ transform:`rotate(${r}deg)`, flexShrink:0 }}><polyline points="6 9 12 15 18 9"/></svg>;
};

const AsperoMark = () => (
  <svg width="28" height="28" viewBox="0 0 80 80" style={{ borderRadius: 8 }}>
    <rect width="80" height="80" rx="14" fill={T.ink}/>
    <path d="M40 14 L62 64 L51 64 L40 38 L29 64 L18 64 Z M40 50 L46 64 L34 64 Z" fill={T.green}/>
  </svg>
);

/* ── StatusBar */
const StatusBar = () => (
  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 28px 8px', background:T.ink800, position:'relative', zIndex:10, flexShrink:0 }}>
    <div style={{ position:'absolute', top:12, left:'50%', transform:'translateX(-50%)', width:120, height:32, background:'#000', borderRadius:20, zIndex:20 }}/>
    <span style={{ fontSize:15, fontWeight:600, color:T.white }}>9:41</span>
    <svg width="54" height="13" viewBox="0 0 54 13" fill={T.white}>
      <rect x="0" y="7.5" width="3" height="5.5" rx=".7"/><rect x="5" y="5" width="3" height="8" rx=".7"/>
      <rect x="10" y="2.5" width="3" height="10.5" rx=".7"/><rect x="15" y="0" width="3" height="13" rx=".7"/>
      <rect x="22" y="3" width="12" height="10" rx="2.5" stroke={T.white} strokeWidth="1.2" fill="none"/>
      <rect x="24" y="5" width="8" height="6" rx="1.5" fill={T.white}/>
      <rect x="40" y="2" width="3.2" height="5" rx=".7"/><rect x="44.8" y="0" width="3.2" height="8" rx=".7"/><rect x="49.6" y="0" width="3.2" height="11" rx=".7"/>
    </svg>
  </div>
);

/* ── Chip */
const Chip = ({ children, kind = 'aaa' }) => {
  const styles = {
    aaa:     { background:T.white, color:T.ink, border:`1px solid ${T.borderD}` },
    secured: { background:T.lavender, color:T.lavFg },
    rating:  { background:T.green100, color:T.green600 },
    mint:    { background:T.mint, color:T.green600, border:`1px solid #B6E8C9` },
  };
  return (
    <span style={{ display:'inline-flex', alignItems:'center', padding:'2px 7px', borderRadius:5, fontWeight:600, fontSize:10, whiteSpace:'nowrap', ...styles[kind] }}>
      {children}
    </span>
  );
};

/* ── Bond row */
const BondRow = ({ initials, issuer, rating, tenure, ytm, color = T.green600, socialProof }) => (
  <div>
    <div style={{ margin:'0 16px 0', background:T.white, border:`1px solid ${T.border}`, borderRadius:14, padding:'13px 13px', display:'flex', alignItems:'center', gap:12, position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', right:-8, bottom:-8, width:60, height:60, borderRadius:'50%', background:`radial-gradient(circle, rgba(1,183,86,.1) 0%, transparent 70%)` }}/>
      <div style={{ width:38, height:38, borderRadius:9, border:`1px solid ${T.border}`, background:T.white, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:800, fontSize:11, color, flexShrink:0 }}>{initials}</div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:13, fontWeight:700, color:T.ink }}>{issuer}</div>
        <div style={{ display:'flex', gap:5, marginTop:4, flexWrap:'wrap' }}>
          <Chip kind="aaa">{rating}</Chip>
          <Chip kind="secured">Senior Secured</Chip>
        </div>
      </div>
      <div style={{ textAlign:'right' }}>
        <div style={{ fontSize:17, fontWeight:800, color:T.green, letterSpacing:'-.02em' }}>{ytm}%</div>
        <div style={{ fontSize:11, color:T.text3, marginTop:1 }}>{tenure}</div>
      </div>
    </div>
    {socialProof && (
      <div style={{ display:'flex', alignItems:'center', gap:5, padding:'5px 29px 10px', fontSize:11, color:T.text3 }}>
