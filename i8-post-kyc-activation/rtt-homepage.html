<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I8 · RTT Homepage — All 9 Sections</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --g:#018E43;--g2:#016B33;--g3:#DCFCE7;--g4:#F0FDF4;
    --dark:#0F1419;--dark2:#1A2233;
    --fg2:#4B5563;--fg3:#9CA3AF;--fg4:#D1D5DB;
    --border:#E5E7EB;--border2:#D1D5DB;
    --page:#F7F8F8;--white:#FFFFFF;
    --amber-bg:#FFFBEB;--amber-fg:#92400E;
    --lav:#EEF2FF;--lav-fg:#4338CA;
    --serif:'Fraunces','Source Serif Pro','Georgia',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Manrope',-apple-system,sans-serif;
    background:#E2E8F0;min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .outer{max-width:1280px;margin:0 auto;padding:40px 24px 80px}

  /* ── page header ─────────────────────────────── */
  .ph{text-align:center;margin-bottom:28px}
  .ph .ey{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin-bottom:8px}
  .ph h1{font-size:24px;font-weight:800;color:var(--dark);letter-spacing:-.02em;margin-bottom:6px}
  .ph p{font-size:13px;color:var(--fg2)}

  /* ── variant toggle ──────────────────────────── */
  .var-toggle{display:flex;justify-content:center;gap:8px;margin-bottom:32px}
  .var-btn{font-family:inherit;cursor:pointer;border:1.5px solid var(--border);padding:10px 22px;border-radius:12px;font-size:13px;font-weight:600;background:var(--white);color:var(--fg2);transition:all 140ms}
  .var-btn.on{border-color:var(--dark);background:var(--dark);color:var(--white)}
  .var-badge{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:var(--g3);color:var(--g2)}

  /* ── two-col layout ──────────────────────────── */
  .two-col{display:flex;gap:24px;align-items:flex-start}
  .phone-col{position:sticky;top:24px}
  .ann-col{flex:1;min-width:0}

  /* ── phone frame ─────────────────────────────── */
  .phone-wrap{filter:drop-shadow(0 24px 56px rgba(15,20,25,.2))}
  .phone{width:390px;border-radius:48px;background:var(--white);overflow:hidden;position:relative;border:1px solid rgba(15,20,25,.1)}
  .phone-inner{display:flex;flex-direction:column;overflow:hidden}

  /* ── status bar ──────────────────────────────── */
  .sb{display:flex;align-items:center;justify-content:space-between;padding:14px 28px 8px;position:relative;z-index:10;flex-shrink:0;background:var(--white)}
  .sb .di{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:122px;height:34px;background:#000;border-radius:20px;z-index:20}
  .sb .t{font-size:15px;font-weight:600;letter-spacing:-.01em;color:var(--dark)}

  /* ── top bar ─────────────────────────────────── */
  .topbar{display:flex;align-items:center;padding:6px 16px 10px;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border)}
  .topbar .logo-sq{width:28px;height:28px;border-radius:8px;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .topbar .brand{font-size:15px;font-weight:700;color:var(--dark)}
  .topbar .rt{display:flex;align-items:center;gap:8px;margin-left:auto}
  .iconbtn{width:34px;height:34px;border-radius:10px;border:0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dark)}
  .dot{width:7px;height:7px;border-radius:50%;background:#EF4444;position:absolute;top:4px;right:4px}
  .ava{width:30px;height:30px;border-radius:10px;background:var(--g3);color:var(--g2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

  /* ── page body ───────────────────────────────── */
  .rtt-body{flex:1;overflow-y:auto;padding-bottom:32px;background:var(--page)}
  .rtt-body::-webkit-scrollbar{display:none}

  /* ── section wrapper ─────────────────────────── */
  .rtt-sec{padding:14px 16px 0}
  .rtt-sec h3{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:2px}
  .rtt-sec .sub-line{font-size:11px;color:var(--fg3);font-weight:500;margin-bottom:12px}
  .sec-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .see-all{background:none;border:none;font-size:12px;font-weight:600;color:var(--g);cursor:pointer;display:flex;align-items:center;gap:3px;font-family:inherit}
  .sec-divider{height:1px;background:var(--border);margin:14px 16px 0}

  /* ── nudge card ──────────────────────────────── */
  .nudge-card{margin:10px 16px 4px;background:var(--white);border:1.5px solid #BFDFCB;border-radius:16px;padding:14px;position:relative}
  .nudge-card .dismiss{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:8px;border:0;background:var(--page);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--fg3)}
  .nudge-card .ey{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--fg3);margin-bottom:4px}
  .nudge-card .bn{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px}
  .nudge-card .bm{font-size:11px;color:var(--fg3)}
  .nudge-monthly{padding:10px 0;border-top:1px solid var(--border);margin-top:10px}
  .nudge-monthly .v{display:flex;align-items:baseline;gap:2px}
  .nudge-monthly .num{font-family:var(--serif);font-size:36px;font-weight:600;color:var(--dark);letter-spacing:-.02em}
  .nudge-monthly .unit{font-size:14px;font-weight:500;color:var(--fg2)}
  .nudge-monthly .sub{font-size:11px;color:var(--fg3);margin-top:4px}
  .nudge-amt-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:12.5px}
  .nudge-amt-row .l{color:var(--fg3)}.nudge-amt-row .v{font-weight:700;color:var(--dark)}
  .change-link{font-size:12px;font-weight:600;color:var(--g);background:none;border:none;cursor:pointer;font-family:inherit}
  .nudge-cta-row{display:flex;gap:8px;margin-top:10px}
  .nudge-invest{flex:2;height:40px;border-radius:10px;border:0;background:var(--g);color:var(--white);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .nudge-remind{flex:1;height:40px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);color:var(--fg2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}

  /* ── about grid (variant A) ──────────────────── */
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
  .about-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px}
  .about-card .eyebrow{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--fg3);margin-bottom:4px}
  .about-card .ttl{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:8px}
  .about-card .desc{font-size:11px;color:var(--fg2);line-height:1.5;margin-top:8px}
  .about-card .stat-row{display:flex;gap:8px}
  .about-card .stat .v{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--dark);letter-spacing:-.01em;line-height:1}
  .about-card .stat .l{font-size:9.5px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .track-bar{display:flex;gap:3px;margin-top:6px;margin-bottom:6px}
  .track-bar .tb{flex:1;height:6px;border-radius:2px;background:var(--g)}
  .reg-row{display:flex;gap:5px}
  .reg-row .r{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:var(--g3);color:var(--g2)}

  /* ── video grid (variant B) ──────────────────── */
  .video-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
  .video-card{border-radius:12px;padding:12px;position:relative;min-height:140px;display:flex;flex-direction:column;overflow:hidden}
  .video-card.bond{background:linear-gradient(145deg,#0a4f2a 0%,#052d18 100%)}
  .video-card.issuer{background:linear-gradient(145deg,#1a3a6e 0%,#0d1f3c 100%)}
  .video-card .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);margin-bottom:6px;width:fit-content}
  .video-card .corner-stat{display:flex;gap:10px;margin-bottom:auto}
  .video-card .corner-stat .stat .v{font-family:var(--serif);font-size:16px;font-weight:600;color:#fff;line-height:1}
  .video-card .corner-stat .stat .l{font-size:9px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.05em}
  .video-card .initials{font-family:var(--serif);font-size:28px;font-weight:600;color:rgba(255,255,255,.9);margin-bottom:2px}
  .video-card .founded{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:auto}
  .video-card .play{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin-bottom:8px;align-self:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
  .video-card .ttl-text{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);line-height:1.35;margin-top:auto}
  .video-card .duration{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px}

  /* ── bond list rows ──────────────────────────── */
  .bond-list{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .bond-list-row{display:flex;align-items:center;gap:10px;padding:12px 12px;border-bottom:1px solid var(--border)}
  .bond-list-row:last-child{border-bottom:0}
  .blr-logo{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
  .blr-meta{flex:1;min-width:0}
  .blr-meta .issuer{font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .blr-meta .sub{font-size:11px;color:var(--fg3);margin-top:1px}
  .blr-meta .pill-line{margin-top:4px}
  .ipill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
  .ipill.top{background:var(--g3);color:var(--g2)}
  .ipill.gov{background:#FEF9C3;color:#713F12}
  .ipill.new{background:var(--g3);color:var(--g2)}
  .blr-right{text-align:right}
  .blr-right .v{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--g);letter-spacing:-.01em;line-height:1}
  .blr-right .l{font-size:10px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em}

  /* ── tabbed card ─────────────────────────────── */
  .tabbed-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .tabbed-card .tabs{display:flex;border-bottom:1px solid var(--border)}
  .tabbed-card .tb-t{flex:1;padding:9px 0;background:none;border:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--fg3);cursor:pointer}
  .tabbed-card .tb-t.on{color:var(--dark);border-bottom:2px solid var(--dark)}
  .tabbed-card .footer{display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;font-size:12px;font-weight:600;color:var(--g);cursor:pointer;background:none;border:none;width:100%;font-family:inherit}

  /* ── How bonds work (vertical rows) ─────────── */
  .hbw-list{display:flex;flex-direction:column;gap:0}
  .hbw-row{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
  .hbw-row:last-child{border-bottom:0}
  .hbw-row .num{width:26px;height:26px;border-radius:50%;background:var(--dark);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px}
  .hbw-row .body .h{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:3px}
  .hbw-row .body .p{font-size:12px;color:var(--fg2);line-height:1.5}

  /* ── New on Aspero grid ───────────────────────── */
  .new-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .new-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px}
  .new-card .ttl{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:3px}
  .new-card .sub{font-size:11px;color:var(--fg3)}
  .new-card .ytm-num{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--g);margin-top:8px;letter-spacing:-.01em;line-height:1}
  .new-card .ytm-lbl{font-size:9.5px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

  /* ── Testimonial ─────────────────────────────── */
  .testimonial{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px}
  .testimonial .quote{font-size:13px;line-height:1.65;color:var(--fg2);font-style:italic;margin-bottom:12px}
  .testimonial .quote .hi{font-family:var(--serif);font-style:normal;font-weight:600;color:var(--dark)}
  .testimonial .author{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--fg2)}
  .testimonial .avi{width:32px;height:32px;border-radius:10px;background:var(--g3);color:var(--g2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}

  /* ── Trust card ──────────────────────────────── */
  .trust-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .trust-row{display:flex;gap:12px;align-items:flex-start;padding:12px;border-bottom:1px solid var(--border)}
  .trust-row:last-child{border-bottom:0}
  .trust-row .ic{width:34px;height:34px;border-radius:10px;background:var(--g4);color:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .trust-row .body .h{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px}
  .trust-row .body .p{font-size:11.5px;color:var(--fg2);line-height:1.5}

  /* ── Explore link ─────────────────────────────── */
  .explore-row{display:flex;align-items:center;justify-content:center;gap:5px;padding:18px 0;font-size:13px;font-weight:700;color:var(--g)}

  /* ── Tab bar ─────────────────────────────────── */
  .tabbar{display:flex;background:var(--white);border-top:1px solid var(--border);padding:8px 0 20px;flex-shrink:0}
  .tb-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0}
  .tb-btn svg{color:var(--fg3)}
  .tb-btn .label{font-size:10px;font-weight:600;color:var(--fg3)}
  .tb-btn.on svg,.tb-btn.on .label{color:var(--g)}

  /* ── annotation panel ────────────────────────── */
  .ann-panel{padding-top:8px}
  .ann-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
  .ann-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin-bottom:6px}
  .ann-val{font-size:13px;font-weight:600;color:var(--dark);line-height:1.6}
  .ann-val .hi{color:var(--g)}
  .ann-ul{font-size:12px;color:var(--fg2);line-height:1.8;padding-left:16px}
  .spec-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
  .spec-row:last-child{border-bottom:0}
  .spec-k{color:var(--fg3);font-weight:500}.spec-v{color:var(--dark);font-weight:700}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ─── DATA ──────────────────────────────────────────────────── */
const MATCHED = { issuer:'REC Limited', name:'PSU NCD 10.50% Mar 2028', isin:'INE020B07JZ4', rating:'AA+', type:'PSU · Secured', tenure:'24 months', ytm:10.5, amount:50000, monthly:438, colour:'#0E7A39', initials:'RE', faceValue:1000 };
const SHORTER = { issuer:'Bajaj Finance', name:'NCD 9.80% Nov 2027', isin:'INE296A07PL2', rating:'AAA', type:'NBFC · Secured', tenure:'18 months', ytm:9.8, amount:50000, monthly:408, colour:'#1F3A93', initials:'BF', faceValue:1000 };

/* ─── ICONS ─────────────────────────────────────────────────── */
const IC = (p) => <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>{p.children}</svg>;

/* ─── StatusBar ─────────────────────────────────────────────── */
const StatusBar = () => (
  <div className="sb">
    <div className="di"/>
    <span className="t">9:41</span>
    <svg width="54" height="13" viewBox="0 0 54 13" fill="#0F1419">
      <rect x="0" y="7.5" width="3" height="5.5" rx=".7"/><rect x="5" y="5" width="3" height="8" rx=".7"/>

      <rect x="40" y="0" width="3.2" height="5.5" rx=".7"/><rect x="44.8" y="0" width="3.2" height="8" rx=".7"/>
      <rect x="49.6" y="0" width="3.2" height="11" rx=".7"/>
    </svg>
  </div>
);

/* ─── TabBar ─────────────────────────────────────────────────── */
