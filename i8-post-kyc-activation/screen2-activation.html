<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I8 · Post-KYC Activation — All Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --g:#018E43; --g2:#016B33; --g3:#DCFCE7; --g4:#F0FDF4;
    --dark:#0F1419; --dark2:#1A2233;
    --fg2:#4B5563; --fg3:#9CA3AF; --fg4:#D1D5DB;
    --border:#E5E7EB; --border2:#D1D5DB;
    --page:#F7F8F8; --white:#FFFFFF;
    --amber-bg:#FFFBEB; --amber-fg:#92400E; --amber-border:#FDE68A;
    --lav:#EEF2FF; --lav-fg:#4338CA;
    --red:#DC2626; --red-bg:#FEF2F2;
    --serif:'Fraunces','Source Serif Pro','Georgia',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Manrope',-apple-system,sans-serif;
    background:#E2E8F0;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:40px 24px 80px;
    -webkit-font-smoothing:antialiased;
  }

  /* ── page header ─────────────────────────────── */
  .ph{text-align:center;margin-bottom:36px}
  .ph .ey{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin-bottom:8px}
  .ph h1{font-size:24px;font-weight:800;color:var(--dark);letter-spacing:-.02em;margin-bottom:6px}
  .ph p{font-size:13px;color:var(--fg2)}

  /* ── tab bar ─────────────────────────────────── */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:32px;background:rgba(15,20,25,.07);padding:5px;border-radius:14px;max-width:900px}
  .tab{font-family:inherit;cursor:pointer;border:0;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;transition:all 140ms;background:transparent;color:var(--fg2)}
  .tab.on{background:var(--white);color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.1)}

  /* ── layout ──────────────────────────────────── */
  .layout{display:flex;gap:28px;align-items:flex-start;max-width:960px;width:100%;margin:0 auto}
  .ann{flex:1;min-width:180px}
  .ann-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
  .ann-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);margin-bottom:5px}
  .ann-val{font-size:13px;font-weight:600;color:var(--dark);line-height:1.6}
  .ann-val .hi{color:var(--g)}
  .ann-ul{font-size:12px;color:var(--fg2);line-height:1.8;padding-left:16px}
  .spec-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
  .spec-row:last-child{border-bottom:0}
  .spec-k{color:var(--fg3);font-weight:500}.spec-v{color:var(--dark);font-weight:700}

  /* ── phone frame ─────────────────────────────── */
  .phone-wrap{display:flex;justify-content:center;filter:drop-shadow(0 24px 56px rgba(15,20,25,.2))}
  .phone{width:390px;border-radius:48px;background:var(--white);overflow:hidden;position:relative;border:1px solid rgba(15,20,25,.1)}
  .phone-inner{display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:812px}

  /* ── status bar ──────────────────────────────── */
  .sb{display:flex;align-items:center;justify-content:space-between;padding:14px 28px 8px;position:relative;z-index:10;flex-shrink:0}
  .sb.dk{background:var(--dark)}
  .sb.lt{background:var(--white)}
  .sb .di{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:122px;height:34px;background:#000;border-radius:20px;z-index:20}
  .sb .t{font-size:15px;font-weight:600;letter-spacing:-.01em}

  /* ── top bar ─────────────────────────────────── */
  .topbar{display:flex;align-items:center;padding:6px 16px 10px;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border)}
  .topbar.dk{background:var(--dark);border-bottom:1px solid rgba(255,255,255,.08)}
  .topbar .logo-pill{display:flex;align-items:center;gap:8px;flex:1}
  .topbar .logo-sq{width:28px;height:28px;border-radius:8px;background:var(--dark);display:flex;align-items:center;justify-content:center}
  .topbar .logo-sq svg{fill:var(--g);width:16px;height:16px}
  .topbar .brand{font-size:15px;font-weight:700}
  .topbar .rt{display:flex;align-items:center;gap:8px;margin-left:auto}
  .iconbtn{width:34px;height:34px;border-radius:10px;border:0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dark)}
  .iconbtn.dk{color:var(--white)}
  .back-btn{width:34px;height:34px;border-radius:10px;border:0;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--white)}
  .back-btn.lt{background:var(--page);color:var(--dark)}
  .topbar-title{font-size:15px;font-weight:600;color:var(--white)}
  .topbar-title.dk-t{color:var(--dark)}
  .ava{width:30px;height:30px;border-radius:10px;background:var(--g3);color:var(--g2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

  /* ── scroll body ─────────────────────────────── */
  .body{flex:1;overflow-y:auto;padding-bottom:32px}
  .body::-webkit-scrollbar{display:none}

  /* ── act-hero ────────────────────────────────── */
  .act-hero{padding:18px 16px 0}
  .act-eyebrow{display:inline-flex;align-items:center;gap:7px;background:var(--g3);color:#166534;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px}
  .act-eyebrow .pulse{width:7px;height:7px;border-radius:50%;background:#16A34A;flex-shrink:0;animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.9)}}
  .act-title{font-size:22px;font-weight:800;color:var(--dark);letter-spacing:-.025em;line-height:1.15;margin-bottom:8px}
  .act-sub{font-size:13px;color:var(--fg2);line-height:1.5;margin-bottom:16px}

  /* ── bond card ───────────────────────────────── */
  .i8-card{margin:0 16px 14px;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(15,20,25,.06);position:relative}
  .matched-tag{position:absolute;top:-11px;left:20px;display:inline-flex;align-items:center;gap:5px;background:var(--g);color:var(--white);padding:4px 10px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(1,142,67,.3)}
  .bond-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .bond-logo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--white);position:relative;flex-shrink:0}
  .bond-meta .issuer{font-size:14px;font-weight:700;color:var(--dark);line-height:1.2}
  .bond-meta .isin{font-size:10px;color:var(--fg3);margin-top:1px}
  .bond-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
  .bb{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:600;white-space:nowrap}
  .bb.aa{background:#ECFDF5;color:#065F46}
  .bb.aaa{background:#EFF6FF;color:#1E40AF}
  .bb.type{background:var(--page);color:var(--fg2);border:1px solid var(--border)}
  .bb.gov{background:#FEF9C3;color:#713F12}

  /* ── monthly hero ────────────────────────────── */
  .monthly-hero{padding:12px 0;border-top:1px solid var(--border);margin-top:4px}
  .monthly-lbl{font-size:10.5px;color:var(--fg3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .monthly-val{display:flex;align-items:baseline;gap:2px;line-height:1}
  .monthly-val .unit{font-size:16px;font-weight:600;color:var(--dark)}
  .monthly-val .num{font-family:var(--serif);font-size:44px;font-weight:600;color:var(--dark);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .monthly-val .denom{font-size:14px;font-weight:500;color:var(--fg2);margin-left:2px}
  .monthly-sub{font-size:11px;color:var(--fg3);margin-top:5px}

  /* ── amount row ──────────────────────────────── */
  .amt-row{margin:0 16px 10px;background:var(--page);border:1px solid var(--border);border-radius:12px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
  .amt-row .lbl{font-size:11px;color:var(--fg3);font-weight:500;margin-bottom:2px}
  .amt-row .val{font-size:15px;font-weight:700;color:var(--dark)}
  .change-link{font-size:12px;font-weight:600;color:var(--g);background:none;border:none;cursor:pointer;font-family:inherit}

  /* ── why-pill ────────────────────────────────── */
  .why-pill{margin:0 16px 14px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--page)}
  .why-head{display:flex;align-items:center;padding:11px 14px;gap:8px;cursor:pointer;width:100%;border:0;background:transparent;text-align:left;font-family:inherit}
  .why-head .ic{color:var(--fg3)}
  .why-head .ttl{flex:1;font-size:13px;font-weight:600;color:var(--dark)}
  .why-head .meta{font-size:11px;color:var(--fg3);font-weight:500;margin-top:1px}
  .why-head .chev{color:var(--fg3)}
  .why-body{padding:0 14px 14px}
  .why-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
  .why-cell{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
  .why-cell .l{font-size:10px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .why-cell .v{font-size:12px;font-weight:600;color:var(--dark);display:flex;align-items:center;gap:4px}
  .nsdl-tag{display:inline-flex;align-items:center;gap:2px;background:#FEF3C7;color:#92400E;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px}
  .why-profile{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--border);font-size:11.5px}
  .why-profile .l{color:var(--fg3);font-weight:500}
  .why-profile .v{display:flex;align-items:center;gap:4px;font-weight:700;color:var(--dark)}

  /* ── CTA stack ───────────────────────────────── */
  .cta-stack{padding:0 16px;display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .btn-primary{width:100%;height:52px;border-radius:12px;border:0;background:var(--g);color:var(--white);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:-.01em;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 12px rgba(1,142,67,.25)}
  .btn-ghost{width:100%;padding:14px 20px;border-radius:12px;border:1.5px solid var(--border2);background:var(--white);color:var(--dark);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer}
  .btn-link{background:none;border:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--fg2);cursor:pointer;text-align:center;padding:4px 0}

  /* ── chip selection ──────────────────────────── */
  .chip-group{padding:0 16px 14px}
  .chip-label{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:8px}
  .chip-label .sub{font-size:11px;font-weight:500;color:var(--g)}
  .chip-row{display:flex;gap:8px;flex-wrap:wrap}
  .chip-opt{padding:9px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-weight:600;color:var(--dark);background:var(--white);cursor:pointer;font-family:inherit;transition:all 120ms}
  .chip-opt.on{background:var(--dark);color:var(--white);border-color:var(--dark)}

  /* ── locked card ─────────────────────────────── */
  .locked-card{margin:0 16px 12px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .locked-card .head{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:var(--page);border-bottom:1px solid var(--border)}
  .locked-card .head .ic{color:var(--fg3);margin-top:1px}
  .locked-card .head .ttl{font-size:12.5px;font-weight:700;color:var(--dark)}
  .locked-card .head .meta{font-size:10.5px;color:var(--fg3);font-weight:500;margin-top:1px}

  /* ── amber strip ─────────────────────────────── */
  .amber-strip{margin:0 16px 14px;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:12px;padding:11px 14px;display:flex;align-items:flex-start;gap:9px}
  .amber-strip .ic{color:#B45309;flex-shrink:0;margin-top:1px}
  .amber-strip .txt{font-size:12px;color:#78350F;line-height:1.55}
  .amber-strip a{color:#B45309;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:3px}

  /* ── switched banner ─────────────────────────── */
  .switched-banner{margin:0 16px 14px;background:var(--g3);border:1px solid #BBF7D0;border-radius:12px;padding:11px 14px;display:flex;align-items:flex-start;gap:9px}
  .switched-banner .ic{color:var(--g);flex-shrink:0;margin-top:1px}
  .switched-banner .body{flex:1;font-size:12.5px;color:#166534;line-height:1.5}
  .switched-banner .undo{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--g);cursor:pointer;white-space:nowrap;margin-top:1px}

  /* ── tab bar ─────────────────────────────────── */
  .tabbar{display:flex;background:var(--white);border-top:1px solid var(--border);padding:8px 0 20px;flex-shrink:0}
  .tb-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0}
  .tb-btn svg{color:var(--fg3)}
  .tb-btn .label{font-size:10px;font-weight:600;color:var(--fg3)}
  .tb-btn.on svg{color:var(--g)}
  .tb-btn.on .label{color:var(--g)}
  .hi-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(15,20,25,.15)}

  /* ── lock screen ─────────────────────────────── */
  .lock-screen{flex:1;display:flex;flex-direction:column;position:relative;background:radial-gradient(ellipse at 50% 20%, #1a3a2a 0%, #0a0f0a 100%)}
  .lock-sb{background:transparent!important}
  .lock-time-block{text-align:center;padding:48px 0 28px;color:var(--white)}
  .lock-time{font-family:var(--serif);font-size:72px;font-weight:300;letter-spacing:-.02em;line-height:1}
  .lock-date{font-size:16px;font-weight:400;color:rgba(255,255,255,.75);margin-top:6px}
  .notif-stack{padding:0 16px;display:flex;flex-direction:column;gap:10px}
  .notif{background:rgba(255,255,255,.14);backdrop-filter:blur(20px) saturate(1.8);border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:13px;display:flex;gap:10px}
  .notif .leading{width:34px;height:34px;border-radius:10px;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--white);flex-shrink:0}
  .notif .body{flex:1;min-width:0}
  .notif .row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .notif .app{font-size:11.5px;font-weight:700;color:rgba(255,255,255,.9)}
  .notif .time-ago{font-size:10.5px;color:rgba(255,255,255,.5)}
  .notif .title{font-size:13px;font-weight:600;color:var(--white);line-height:1.35;margin-bottom:2px}
  .notif .msg{font-size:11.5px;color:rgba(255,255,255,.75);line-height:1.4}
  .swipe-hint{text-align:center;margin-top:24px;font-size:11.5px;color:rgba(255,255,255,.4);font-weight:500}
  .lock-icon-row{display:flex;justify-content:center;margin-bottom:8px}

  /* ── nudge card ──────────────────────────────── */
  .nudge-card{margin:12px 16px;background:var(--white);border:1.5px solid #BFDFCB;border-radius:16px;padding:14px;position:relative}
  .nudge-card .dismiss{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:8px;border:0;background:var(--page);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--fg3)}
  .nudge-card .ey{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--fg3);margin-bottom:4px}
  .nudge-card .bn{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px}
  .nudge-card .bm{font-size:11px;color:var(--fg3)}
  .nudge-monthly{padding:10px 0;border-top:1px solid var(--border);margin-top:10px}
  .nudge-monthly .v{display:flex;align-items:baseline;gap:2px}
  .nudge-monthly .v .num{font-family:var(--serif);font-size:36px;font-weight:600;color:var(--dark);letter-spacing:-.02em}
  .nudge-monthly .v .unit{font-size:14px;font-weight:500;color:var(--fg2)}
  .nudge-monthly .sub{font-size:11px;color:var(--fg3);margin-top:4px}
  .nudge-amt-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:12.5px}
  .nudge-amt-row .l{color:var(--fg3)}.nudge-amt-row .v{font-weight:700;color:var(--dark)}
  .nudge-cta-row{display:flex;gap:8px;margin-top:10px}
  .nudge-invest{flex:2;height:40px;border-radius:10px;border:0;background:var(--g);color:var(--white);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
  .nudge-remind{flex:1;height:40px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);color:var(--fg2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .nudge-edit-block{margin-top:10px}
  .nudge-edit-block .h{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:8px}
  .nudge-edit-block .amt-input{border:1.5px solid var(--g);border-radius:10px;padding:10px 14px;font-size:16px;font-weight:700;color:var(--dark);background:var(--g4)}
  .nudge-edit-block .chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .nudge-edit-block .ec{padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-weight:600;color:var(--dark);background:var(--white);cursor:pointer;font-family:inherit}
  .nudge-edit-block .ec.on{background:var(--dark);color:var(--white);border-color:var(--dark)}
  .nudge-live{display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px 10px;background:var(--g4);border-radius:8px;font-size:11.5px}
  .nudge-live .pulse{width:6px;height:6px;border-radius:50%;background:#16A34A;flex-shrink:0}
  .nudge-live .l{color:var(--fg2);flex:1}
  .nudge-live .v{font-weight:700;color:var(--g)}

  /* ── web frame ───────────────────────────────── */
  .web-frame{background:var(--white);border-radius:16px;overflow:hidden;width:960px;box-shadow:0 8px 32px rgba(15,20,25,.15);border:1px solid var(--border)}
  .web-topbar{display:flex;align-items:center;padding:12px 24px;border-bottom:1px solid var(--border);gap:20px}
  .web-topbar .logo-sq{width:30px;height:30px;border-radius:8px;background:var(--dark);display:flex;align-items:center;justify-content:center}
  .web-topbar .brand{font-size:15px;font-weight:700;color:var(--dark)}
  .web-topbar nav{display:flex;gap:2px;margin-left:28px}
  .web-topbar nav a{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--fg2);cursor:pointer;text-decoration:none}
  .web-topbar nav a.on{background:var(--page);color:var(--dark)}
  .web-body{display:flex;min-height:700px}
  .web-left{flex:1;padding:48px 40px;border-right:1px solid var(--border)}
  .web-left h1{font-size:30px;font-weight:800;color:var(--dark);letter-spacing:-.025em;margin:14px 0 12px;line-height:1.15}
  .web-left .sub{font-size:14px;color:var(--fg2);line-height:1.6;margin-bottom:20px}
  .check-row{display:flex;flex-direction:column;gap:9px}
  .ck{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg2)}
  .ck .ic{width:20px;height:20px;border-radius:6px;background:var(--g3);display:flex;align-items:center;justify-content:center;color:var(--g);flex-shrink:0}
  .web-right{width:480px;padding:32px;background:var(--page)}
  .web-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .web-card-inner{padding:20px}
  .web-monthly .lbl{font-size:10.5px;color:var(--fg3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
