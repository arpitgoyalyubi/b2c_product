name: Generate Product Hub

on:
  push:
    branches: [main]
    paths:
      - "**/*.meta.json"   # any meta sidecar changed/added
      - "*/meta.json"      # subfolder meta changed/added
      - "scripts/generate_hub.py"  # script itself changed

  workflow_dispatch:       # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate index.html
        run: python scripts/generate_hub.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "index.html unchanged — nothing to commit"
          else
            git commit -m "chore: auto-regenerate product hub index"
            git push
          fi
